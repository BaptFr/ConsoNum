services:
 
  # DB
  mariadb:
    image: mariadb:11.2
    container_name: consonum_mariadb_prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-consonum}
      MYSQL_USER: ${DB_USER:-consonum_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-consonum_password}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - consonum_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BACKEND SYMFONY

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consonum_backend_prod
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      DATABASE_URL: mysql://${DB_USER:-consonum_user}:${DB_PASSWORD:-consonum_password}@mariadb:3306/${DB_DATABASE:-consonum}?serverVersion=11.2.0-MariaDB&charset=utf8mb4
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:3000}
    volumes:
      - ./backend/config/jwt:/app/config/jwt:ro
    networks:
      - consonum_network
    expose:
      - "9000"

  # NGINX (Reverse Proxy Backend)
  nginx:
    image: nginx:alpine
    container_name: consonum_nginx_prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/app/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - consonum_network

  # FRONTEND NEXT.JS
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: consonum_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    networks:
      - consonum_network

# VOLUMES
volumes:
  mariadb_data:
    driver: local

# NETWORK
networks:
  consonum_network:
    driver: bridge