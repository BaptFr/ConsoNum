version: "3.8"

services:
  db:
    image: mariadb:10.11
    container_name: consonum_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mariadb       
      MYSQL_DATABASE: consonum_db           
      MYSQL_USER: consonum                    
      MYSQL_PASSWORD: mariadb            
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  php:
    image: php:8.2-fpm
    container_name: consonum_php
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      DATABASE_URL: "mysql://consonum:mariadb@db:3306/consonum_db?serverVersion=mariadb-10.11.6"

  web:
    image: nginx:alpine
    container_name: consonum_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - php

volumes:
  db_data:
